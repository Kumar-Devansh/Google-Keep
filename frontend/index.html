<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A modern, glass and 3D note-taking app inspired by Google Keep. Create, organize, and manage your notes with ease." />
    <meta name="keywords" content="notes, keep, note-taking, organize, productivity" />
    <meta name="theme-color" content="#0a0d1a" />
    <meta name="og:title" content="Keep — Floating Notes" />
    <meta name="og:description" content="A modern note-taking application for productivity" />
    <meta name="og:image" content="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%238B7CF6'/><stop offset='100%25' stop-color='%235EEAD4'/></linearGradient></defs><rect rx='20' fill='%230a0d1a' width='100' height='100'/><rect x='28' y='28' width='44' height='44' rx='10' fill='url(%23g)' transform='rotate(45 50 50)'/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' fill='%230a0d1a' width='100' height='100'/><circle cx='50' cy='50' r='28' fill='%238B7CF6'/></svg>" />

    <title>Keep — Floating Notes</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #0a0d1a;
        overflow-y: scroll;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .root-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background:
          radial-gradient(circle at 20% 20%, rgba(139, 124, 246, 0.35), transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(94, 234, 212, 0.3), transparent 50%),
          #0a0d1a;
      }

      .root-loading-content {
        text-align: center;
        color: white;
      }

      .root-loading-spinner {
        width: 54px;
        height: 54px;
        margin: 0 auto 22px;
        border-radius: 14px;
        background: linear-gradient(135deg, #8B7CF6, #5EEAD4);
        box-shadow: 0 0 40px rgba(139, 124, 246, 0.5);
        animation: tumble 1.4s ease-in-out infinite;
      }

      @keyframes tumble {
        0%   { transform: rotate(0deg) scale(1); }
        50%  { transform: rotate(180deg) scale(0.85); }
        100% { transform: rotate(360deg) scale(1); }
      }

      .root-loading-text {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #f1f2f8;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="root-loading">
        <div class="root-loading-content">
          <div class="root-loading-spinner"></div>
          <p class="root-loading-text">Loading Keep...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

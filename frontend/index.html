<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A modern, feature-rich note-taking application inspired by Google Keep. Create, organize, and manage your notes with ease." />
    <meta name="keywords" content="notes, keep, note-taking, organize, productivity" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="og:title" content="Google Keep Clone" />
    <meta name="og:description" content="A modern note-taking application for productivity" />
    <meta name="og:image" content="/favicon.png" />
    
    <!-- Preconnect to Google Fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts - Segoe UI alternative with Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234F46E5' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>K</text></svg>" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234F46E5' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>K</text></svg>" />
    
    <title>Keep - Note Taking App</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #f8fafc;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Loading animation while React mounts */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes shimmer {
        0% {
          background-position: -1000px 0;
        }
        100% {
          background-position: 1000px 0;
        }
      }

      .root-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      }

      .root-loading-content {
        text-align: center;
        color: white;
      }

      .root-loading-spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto 20px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .root-loading-text {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* Prevent layout shift */
      body {
        overflow-y: scroll;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="root-loading">
        <div class="root-loading-content">
          <div class="root-loading-spinner"></div>
          <p class="root-loading-text">Loading Keep...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
